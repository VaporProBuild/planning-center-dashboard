name: CI / Deploy

on:
  push:
    branches-ignore: ['main']

jobs:
  format-check:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Check formatting (Prettier)
        run: npx prettier --check src/
